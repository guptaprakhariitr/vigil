name: release
# Build the vigil binary + container on a version tag and publish to the GitHub
# Release and GHCR. The deterministic engine lives in a separate private repo, so
# CI checks it out alongside (needs a read token in the ENGINE_REPO_TOKEN secret).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: vigil }
      - uses: actions/checkout@v4
        with:
          repository: guptaprakhariitr/vigil-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN }}
          path: vigil-engine
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: build (glibc + static musl)
        run: |
          cd vigil
          # glibc build (smaller, but needs a recent glibc on the host)
          cargo build --release && strip target/release/vigil
          cp target/release/vigil vigil-x86_64-unknown-linux-gnu
          # fully static musl build — runs on ANY Linux (Ubuntu 20.04, Alpine, …),
          # no glibc version dependency. This is the recommended default download.
          cargo build --release --target x86_64-unknown-linux-musl
          strip target/x86_64-unknown-linux-musl/release/vigil
          cp target/x86_64-unknown-linux-musl/release/vigil vigil-x86_64-unknown-linux-musl
      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vigil/vigil-x86_64-unknown-linux-gnu
            vigil/vigil-x86_64-unknown-linux-musl

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: vigil }
      - uses: actions/checkout@v4
        with:
          repository: guptaprakhariitr/vigil-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN }}
          path: vigil-engine
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: vigil/Dockerfile
          push: true
          tags: ghcr.io/guptaprakhariitr/vigil:latest,ghcr.io/guptaprakhariitr/vigil:${{ github.ref_name }}
